server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # SPA fallback: all routes resolve to index.html.
    # no-cache: the HTML must revalidate on every load (ETag makes it a cheap
    # 304) — a stale cached index.html would pin the app to an old bundle.
    location / {
        add_header Cache-Control "no-cache" always;
        try_files $uri $uri/ /index.html;
    }

    # Proxy API calls to the backend service.
    # NOTE: no URI part on proxy_pass — the backend serves routes under /api,
    # so the request path must be forwarded unchanged.
    location /api/ {
        proxy_pass http://backend:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # SSE task-event stream (/api/tasks/:id/events): no buffering, long read timeout.
        proxy_buffering off;
        proxy_read_timeout 3600s;
    }

    # Long-lived static assets
    location /assets/ {
        expires 30d;
        add_header Cache-Control "public, immutable";
    }
}
