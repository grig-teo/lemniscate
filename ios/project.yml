name: Lemniscate
options:
  bundleIdPrefix: space.grigteo
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
targets:
  Lemniscate:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: Lemniscate
    configFiles:
      Debug: Base.xcconfig
      Release: Base.xcconfig
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: space.grigteo.lemniscate
        INFOPLIST_FILE: Lemniscate/Info.plist
        GENERATE_INFOPLIST_FILE: NO
        SWIFT_VERSION: "5.0"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        TARGETED_DEVICE_FAMILY: "1,2"
        MARKETING_VERSION: "1.0"
        CURRENT_PROJECT_VERSION: "1"
